; Pool PHP-FPM ajustado para producao no Railway
; (default do php-fpm-alpine e max_children=5, insuficiente)

[www]
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Timeouts generosos para uploads e relatorios pesados
request_terminate_timeout = 120
